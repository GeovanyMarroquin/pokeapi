<div class="relative">
  <input
    type="text"
    class="w-full px-3 py-2 border border-gray-300 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#0a2d6e] focus:border-transparent text-sm"
    [placeholder]="placeholder()"
    #txtInput
    (keydown.enter)="emitValue(txtInput.value)"
    (keyup)="onKeyPress(txtInput.value)"
    [value]="initialValue()"
  />

  <svg
    class="absolute right-2 top-2 w-4 h-4 text-gray-400"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
    />
  </svg>
</div>
