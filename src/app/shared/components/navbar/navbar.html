<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
    <a routerLink="/" aria-label="Pokémon - Inicio">
      <img
        src="images/logo-universal.svg"
        alt="Pokémon"
        class="h-8 sm:h-10 w-auto"
        width="120"
        height="40"
      />
    </a>

    <ul class="flex items-center gap-4 sm:gap-8 list-none m-0 p-0">
      <li>
        <a
          routerLink="/"
          routerLinkActive="nav-link-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
        >
          Inicio
        </a>
      </li>
      <li>
        <a routerLink="/entrenador" routerLinkActive="nav-link-active" class="nav-link">
          <span class="hidden sm:inline">Configurar perfil de Pokémon</span>
          <span class="sm:hidden">Mi perfil</span>
        </a>
      </li>
    </ul>
  </nav>
</header>
