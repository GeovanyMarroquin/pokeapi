<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <!-- Hero -->
  <section class="text-center py-16 sm:py-24">
    <img
      src="images/logo-universal.svg"
      alt="Pokémon"
      class="mx-auto h-20 sm:h-28 w-auto mb-6"
      width="220"
      height="80"
    />
    <h1 class="text-3xl sm:text-5xl font-bold text-gray-900 mb-4">Bienvenido a Pokémon App</h1>
    <p class="text-base sm:text-lg text-gray-600 max-w-xl mx-auto mb-8">
      Explora el mundo Pokémon, descubre información de cada especie y configura tu perfil de
      entrenador.
    </p>
    <a
      (click)="irAMiPerfil()"
      class="inline-block bg-red-600 text-white font-semibold px-6 py-3 rounded-lg hover:bg-red-700 transition-colors duration-150"
    >
      Ir a configurar mi perfil
    </a>
  </section>
</div>
