<div class="min-h-screen bg-gray-50 flex flex-col items-center py-4 px-4">
  <!-- Loader component -->
  <shared-loader [isVisible]="stepper.isLoading()" />

  <!-- Step indicators -->
  <div class="flex items-center mb-10">
    @for (step of stepper.steps; track step.label; let i = $index) {
      <div class="flex items-center">
        <div class="flex flex-col items-center">
          <div
            [class]="
              'w-10 h-10 rounded-full flex items-center justify-center font-semibold text-sm transition-all duration-300 ' +
              (stepper.currentStep() > i
                ? 'bg-green-500 text-white'
                : stepper.currentStep() === i
                  ? 'bg-blue-600 text-white ring-4 ring-blue-100'
                  : 'bg-gray-200 text-gray-400')
            "
          >
            @if (stepper.currentStep() > i) {
              ✓
            } @else {
              {{ i + 1 }}
            }
          </div>
          <span
            [class]="
              'mt-2 text-xs font-medium whitespace-nowrap transition-colors duration-300 ' +
              (stepper.currentStep() === i ? 'text-blue-600' : 'text-gray-400')
            "
          >
            {{ step.label }}
          </span>
        </div>

        @if (i < stepper.steps.length - 1) {
          <div
            [class]="
              'w-20 h-0.5 mx-2 mb-5 transition-colors duration-300 ' +
              (stepper.currentStep() > i ? 'bg-green-500' : 'bg-gray-200')
            "
          ></div>
        }
      </div>
    }
  </div>

  <div class="w-full max-w-4xl bg-white rounded-2xl shadow-sm border border-gray-100">
    <router-outlet />
  </div>

  <div class="flex gap-4 mt-8">
    @if (stepper.currentStep() > 0) {
      <button
        type="button"
        (click)="stepper.back()"
        class="flex items-center gap-2 px-6 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-700 font-medium hover:bg-gray-50 transition-colors cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        Atrás
      </button>
    }

    @if (stepper.currentStep() < stepper.steps.length - 1) {
      <button
        type="button"
        (click)="stepper.next()"
        [disabled]="!puedeAvanzar() || stepper.isLoading()"
        [class]="
          puedeAvanzar() && !stepper.isLoading()
            ? 'flex items-center gap-2 px-6 py-2.5 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors cursor-pointer'
            : 'flex items-center gap-2 px-6 py-2.5 rounded-lg bg-gray-200 text-gray-400 font-medium cursor-not-allowed'
        "
      >
        Siguiente
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    } @else {
      <button
        type="button"
        class="flex items-center gap-2 px-6 py-2.5 rounded-lg bg-green-600 text-white font-medium hover:bg-green-700 transition-colors cursor-pointer"
        (click)="finalizar()"
      >
        Finalizar
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </button>
    }
  </div>
</div>
