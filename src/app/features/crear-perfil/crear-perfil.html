<div class="bg-white px-10 py-8">
  <div class="mb-10">
    <div class="flex items-center gap-3">
      <h1 class="text-3xl font-bold text-[#0a2d6e]">¡Hola! Configuremos tu perfil</h1>
    </div>
    <p class="text-gray-400 text-sm mt-1 ml-8">Queremos conocerte mejor.</p>
  </div>

  <div class="flex gap-12 items-stretch">
    <div class="flex flex-col gap-3 w-76 shrink-0">
      <div class="bg-[#f5c400] rounded-3xl flex flex-col items-center py-6 px-4 flex-1">
        <!-- <p class="font-bold text-xl text-gray-900 mb-5">Imágen perfil</p> -->
        <p class="font-bold text-xl text-gray-900 mb-5">&nbsp;</p>
        <img
          [src]="fotoUrl()"
          alt="Imagen de perfil"
          class="w-40 h-40 rounded-full bg-white border-4 border-white shadow-md overflow-hidden object-cover"
        />
      </div>

      <input
        #fileInput
        type="file"
        accept="image/*"
        class="hidden"
        (change)="seleccionarFoto($event)"
        aria-label="Seleccionar foto de perfil"
      />
      <button
        type="button"
        (click)="fileInput.click()"
        class="border-2 border-dashed border-gray-300 rounded-xl px-4 py-3 flex items-center justify-center hover:border-blue-400 transition-colors cursor-pointer w-full"
      >
        <span class="text-blue-500 text-sm font-medium">Adjuntar imagen</span>
      </button>
    </div>

    <div class="flex-1 max-w-md">
      <h2 class="text-2xl font-bold text-[#0a2d6e] mb-1">Tu información</h2>
      <p class="text-gray-400 text-sm mb-7">
        Completa la siguiente información<br />para completar tu perfil
      </p>

      <div class="flex flex-col gap-5" [formGroup]="formGroup">
        <div class="relative">
          <label class="absolute -top-2.5 left-3 bg-white px-1 text-xs text-[#0a2d6e] font-semibold"
            >Nombre*</label
          >
          <input
            type="text"
            formControlName="nombre"
            class="w-full border border-[#0a2d6e] rounded-lg px-4 py-3 text-gray-800 outline-none focus:ring-2 focus:ring-[#0a2d6e]/30"
            aria-label="Nombre"
          />
        </div>

        <div class="flex flex-col gap-2">
          <div class="relative">
            <label class="absolute -top-2.5 left-3 bg-white px-1 text-xs text-gray-400 font-medium">
              Pasatiempo favorito
            </label>
            <select
              class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 outline-none focus:border-[#0a2d6e] focus:ring-2 focus:ring-[#0a2d6e]/20"
              (change)="agregarPasatiempo($event)"
            >
              <option value="" disabled selected>Selecciona un pasatiempo</option>
              @for (item of opcionesDisponibles(); track item.value) {
                <option [value]="item.value">{{ item.label }}</option>
              }
            </select>
          </div>

          @if (pasatiemposSeleccionados().length > 0) {
            <div class="flex flex-wrap gap-2">
              @for (valor of pasatiemposSeleccionados(); track valor) {
                <span
                  class="inline-flex items-center gap-1 bg-[#0a2d6e] text-white text-xs font-medium px-3 py-1.5 rounded-full"
                >
                  {{ mostrarChip(valor) }}
                  <button
                    type="button"
                    (click)="eliminarPasatiempo(valor)"
                    class="ml-1 hover:text-yellow-300 transition-colors"
                    [attr.aria-label]="'Eliminar ' + mostrarChip(valor)"
                  >
                    <svg
                      class="w-3 h-3"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2.5"
                        d="M6 18L18 6M6 6l12 12"
                      />
                    </svg>
                  </button>
                </span>
              }
            </div>
          }
        </div>

        <div class="relative">
          <label class="absolute -top-2.5 left-3 bg-white px-1 text-xs text-gray-400 font-medium"
            >Cumpleaños*</label
          >
          <input
            type="date"
            formControlName="cumpleanos"
            [max]="hoy"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-400 outline-none focus:border-[#0a2d6e] focus:ring-2 focus:ring-[#0a2d6e]/20"
            aria-label="Cumpleaños"
          />
        </div>

        <div class="relative">
          <label
            class="absolute -top-2.5 left-3 bg-white px-1 text-xs font-medium"
            [class]="esAdulto() ? 'text-[#0a2d6e] font-semibold' : 'text-gray-400 font-medium'"
          >
            {{ esAdulto() ? 'Dui*' : 'Carnet de minoridad' }}
          </label>
          <input
            type="text"
            formControlName="documento"
            [placeholder]="esAdulto() ? '00000000-0' : ''"
            (input)="esAdulto() ? aplicarMascaraDocumento($event) : null"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 outline-none focus:border-[#0a2d6e] focus:ring-2 focus:ring-[#0a2d6e]/20"
          />
        </div>
      </div>
    </div>
  </div>
</div>
